<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои фотографии - Портфолио</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container photos-page">
        <h1 class="page-title">МОИ ФОТОГРАФИИ</h1>

        <div class="character-side">
            <div class="character-placeholder-photo">
                <img src="images/1.png" alt="Персонаж">
            </div>
        </div>

        <div class="gallery-grid photos-grid">
            
            <div class="gallery-item" data-category="photos">
                <div class="image-placeholder">
                    <img src="photos/cranes_sunset_2026.jpg" alt="Строительные краны на фоне заката">
                </div>
                <p class="item-date">Строительные краны на фоне заката (20.05.2026)</p>
            </div>

            <div class="gallery-item" data-category="photos">
                <div class="image-placeholder">
                    <img src="photos/storm_2026.jpg" alt="Гроза">
                </div>
                <p class="item-date">Гроза (19.05.2026)</p>
            </div>

            <div class="gallery-item" data-category="photos">
                <div class="image-placeholder">
                    <img src="photos/cat_window_2026.jpg" alt="Котейка в окне">
                </div>
                <p class="item-date">Котейка в окне (16.05.2026)</p>
            </div>

            <div class="gallery-item" data-category="photos">
                <div class="image-placeholder">
                    <img src="photos/ramen_2026.jpg" alt="Вкусный рамён">
                </div>
                <p class="item-date">Вкусный рамён (07.05.2026)</p>
            </div>

        </div>

        <a href="index.html" class="back-button">
            <span>←</span> НАЗАД
        </a>
    </main>

    <script src="script.js"></script>
</body>
</html>
